name: Secret Shopper Keep Alive

on:
  schedule:
    - cron: '0 13 * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase
        run: |
          curl -X POST "${{ secrets.SECRET_SHOPPER_SUPABASE_URL }}/rest/v1/keep_alive" \
            -H "apikey: ${{ secrets.SECRET_SHOPPER_SUPABASE_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SECRET_SHOPPER_SUPABASE_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{}'

      - name: Clean up old rows
        run: |
          curl -X DELETE "${{ secrets.SECRET_SHOPPER_SUPABASE_URL }}/rest/v1/keep_alive?pinged_at=lt.$(date -u -d '7 days ago' +%Y-%m-%dT%H:%M:%S)" \
            -H "apikey: ${{ secrets.SECRET_SHOPPER_SUPABASE_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SECRET_SHOPPER_SUPABASE_KEY }}"
